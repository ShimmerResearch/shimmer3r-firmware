name: Build STM32 Firmware

on:
#  push:
#    branches:
#      - main
  workflow_dispatch:
    inputs:
      increment:
        description: "Which version part to increment (vMAJOR.MINOR.PATCH)?"
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
      build_mode:
        description: "Select build mode:"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: write  # Needed for git commit/push and tag creation

env:
  PROJECT_DIR: S3R_Production
  TAG_PREFIX: LogAndStream_Shimmer3R_v
  TAG_PREFIX_JIRA: L&S_S3R_v
  SUBMODULE_FOLDER: log-and-stream-common
  SUBMODULE_REPO: ShimmerResearch/log-and-stream-common

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for tags and versioning
        submodules: recursive

#    - name: Debug path
#      run: pwd

#    - name: Debug directory structure
#      run: |
#        ls -lR S3R_Production/log-and-stream-common/scripts

    - name: Increment version
      run: |
        set -euo pipefail
        chmod +x ../log-and-stream-common/scripts/increment_version.sh
        ../log-and-stream-common/scripts/increment_version.sh ${{ github.event.inputs.increment || 'patch' }}
      working-directory: ${{ env.PROJECT_DIR }}/build

    - name: Save version for next steps
      id: get_version
      run: |
        set -euo pipefail
        echo "version=$(cat ${{ env.PROJECT_DIR }}/build/version.txt)" >> $GITHUB_OUTPUT

    - name: List project files
      run: ls -l -a ${{ env.PROJECT_DIR }}

    - name: Build firmware
      uses: xanderhendriks/action-build-stm32cubeide@v15.0
      with:
        project-path: .
        project-target: '${{ env.PROJECT_DIR }}'

    - name: Find and copy hex file
      run: |
        set -euo pipefail
        mkdir -p build
        HEX_PATH="${{ env.PROJECT_DIR }}/${{ github.event.inputs.build_mode }}/${{ env.PROJECT_DIR }}.hex"

        if [ -f "$HEX_PATH" ]; then
          cp "$HEX_PATH" build/${{ env.TAG_PREFIX }}${{ steps.get_version.outputs.version }}.hex
        else
          echo "No .hex file found in ${{ github.event.inputs.build_mode }} folder."
          exit 1
        fi

    - name: Commit version bump
      run: |
        set -euo pipefail
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add ${{ env.PROJECT_DIR }}/build/version.txt ${{ env.PROJECT_DIR }}/Shimmer_Driver/version.h
        git commit -m "chore: bump firmware version to v${{ steps.get_version.outputs.version }}" || echo "No changes to commit"
        git push

#    - name: Show uncommitted changes
#      run: |
#        git status
#        git diff
#        git diff --cached

#    - name: Check for clean working tree
#      run: |
#        set -euo pipefail
#        if ! git diff --quiet || ! git diff --cached --quiet; then
#          echo "Working tree is dirty. Please commit or stash changes before tagging."
#          exit 1
#        fi

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-hex
        path: build/*.hex

    - name: Create Git tag
      run: |
        set -euo pipefail
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag "${{ env.TAG_PREFIX }}${{ steps.get_version.outputs.version }}"
        git push origin "${{ env.TAG_PREFIX }}${{ steps.get_version.outputs.version }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_PREFIX }}${{ steps.get_version.outputs.version }}
        name: "${{ env.TAG_PREFIX }}${{ steps.get_version.outputs.version }}"
        generate_release_notes: true
        files: build/*.hex
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Link GitHub release to Jira
      if: success()
      env:
        JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        JIRA_PROJECT_KEY: DEV          # adjust
        RELEASE_TAG: ${{ env.TAG_PREFIX_JIRA }}${{ steps.get_version.outputs.version }}
      run: |
        set -euo pipefail
        sudo apt-get update && sudo apt-get install -y jq


        git fetch --tags --quiet
        PREV_TAG=$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || echo "")
        echo "Current tag: $RELEASE_TAG"
        echo "Previous tag: ${PREV_TAG:-<none>}"


        RANGE=""
        if [ -n "$PREV_TAG" ]; then
          RANGE="$PREV_TAG..$RELEASE_TAG"
        else
          RANGE="$RELEASE_TAG"
        fi


        ISSUE_KEYS=$(git log --format='%s%n%b' $RANGE | grep -Eo '[A-Z][A-Z0-9]+-[0-9]+' | sort -u || true)
        if [ -z "$ISSUE_KEYS" ]; then
          echo "No Jira issue keys found; skipping."
          exit 0
        fi
        echo "Found issue keys:"
        echo "$ISSUE_KEYS"


        PROJECT_JSON=$(curl -s -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
          -H 'Accept: application/json' \
          "$JIRA_BASE_URL/rest/api/3/project/$JIRA_PROJECT_KEY")
        PROJECT_ID=$(echo "$PROJECT_JSON" | jq -r '.id')


        EXISTING_VERSION_ID=$(curl -s -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
          -H 'Accept: application/json' \
          "$JIRA_BASE_URL/rest/api/3/project/$JIRA_PROJECT_KEY/versions" | \
          jq -r --arg NAME "$RELEASE_TAG" '.[] | select(.name==$NAME) | .id')


        if [ -n "$EXISTING_VERSION_ID" ]; then
          VERSION_ID="$EXISTING_VERSION_ID"
          echo "Jira version already exists: $RELEASE_TAG (id=$VERSION_ID)"
        else
          echo "Creating Jira version: $RELEASE_TAG"
          CREATE_RESP=$(curl -s -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg name "$RELEASE_TAG" --arg pid "$PROJECT_ID" --arg date "$(date -u +%Y-%m-%d)" \
              '{name:$name, projectId:($pid|tonumber), released:true, releaseDate:$date}')" \
            "$JIRA_BASE_URL/rest/api/3/version")
          VERSION_ID=$(echo "$CREATE_RESP" | jq -r '.id')
          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "null" ]; then
            echo "Failed to create Jira version. Response:"
            echo "$CREATE_RESP"
            exit 1
          fi
          echo "Created version id: $VERSION_ID"
        fi


        echo "Linking issues to version..."
        while read -r KEY; do
          [ -z "$KEY" ] && continue
          echo "Updating $KEY"
          curl -s -o /dev/null -w "%{http_code}\n" \
            -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H 'Content-Type: application/json' \
            -X PUT \
            --data "$(jq -nc --arg v "$RELEASE_TAG" '{update:{fixVersions:[{add:{name:$v}}]}}')" \
            "$JIRA_BASE_URL/rest/api/3/issue/$KEY" | grep -qE '^(204|200)$' || {
              echo "Failed to update $KEY"
            }
        done <<< "$ISSUE_KEYS"


        echo "Done. Jira version '$RELEASE_TAG' linked."

    # Create tag and release in submodule
    - name: Remove actions auth header
      run: |
        git config --unset-all http.https://github.com/.extraheader || true
        git -C '${{ env.PROJECT_DIR }}/${{ env.SUBMODULE_FOLDER }}' config --unset-all http.https://github.com/.extraheader || true

    - name: Prepare submodule remote with PAT
      run: |
        set -euo pipefail
        SUB_PATH='${{ env.PROJECT_DIR }}/${{ env.SUBMODULE_FOLDER }}'
        # Safety: remove any lingering auth header
        git -C "$SUB_PATH" config --unset-all http.https://github.com/.extraheader || true
        # Set remote URL with PAT
        git -C "$SUB_PATH" remote set-url origin "https://${{ secrets.SUBMODULE_PUSH_USER }}:${{ secrets.SUBMODULE_PUSH_TOKEN }}@github.com/${{ env.SUBMODULE_REPO }}.git"
        git -C "$SUB_PATH" remote -v
      
    - name: Tag submodule ${{ env.SUBMODULE_FOLDER }}
      working-directory: ${{ env.PROJECT_DIR }}/${{ env.SUBMODULE_FOLDER }}
      run: |
        set -euo pipefail
        tag='${{ env.TAG_PREFIX }}${{ steps.get_version.outputs.version }}'
        git fetch --tags origin
        if git rev-parse "$tag" >/dev/null 2>&1; then
          echo "Tag $tag already exists. Skipping."
          exit 0
        fi
        git config user.name "${{ secrets.SUBMODULE_PUSH_USER }}"
        git config user.email "${{ secrets.SUBMODULE_PUSH_USER }}@users.noreply.github.com"
        git tag -a "$tag" -m "Release $tag"
        # Push via explicit URL (ensures PAT is used even if remote not rewritten)
        git push "https://${{ secrets.SUBMODULE_PUSH_USER }}:${{ secrets.SUBMODULE_PUSH_TOKEN }}@github.com/${{ env.SUBMODULE_REPO }}.git" "$tag"

    - name: Create GitHub Release in submodule
      env:
        GH_TOKEN: ${{ secrets.SUBMODULE_PUSH_TOKEN }}
        TAG: ${{ env.TAG_PREFIX }}${{ steps.get_version.outputs.version }}
      run: |
        set -euo pipefail
        if gh release view "$TAG" -R "${{ env.SUBMODULE_REPO }}" >/dev/null 2>&1; then
          echo "Release $TAG already exists in $SUBMODULE_REPO; skipping."
        else
          # Add files (e.g., `build/*.txt`) after "$TAG" if you want to attach assets
          gh release create "$TAG" -R "${{ env.SUBMODULE_REPO }}" --title "$TAG" --generate-notes
        fi
