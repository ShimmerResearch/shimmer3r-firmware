name: Build STM32 Firmware

on:
#  push:
#    branches:
#      - main
  workflow_dispatch:
    inputs:
      increment:
        description: "Which version part to increment: major, minor, patch"
        default: "patch"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clean workspace
      run: rm -rf ./*

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: . # Stop github action doubling up the repo root folder
        fetch-depth: 0  # Needed for tags
        submodules: recursive
    
    - name: Increment version
      run: |
        set -euo pipefail
        chmod +x S3R_Production/log-and-stream-common/scripts/increment_version.sh
        S3R_Production/log-and-stream-common/scripts/increment_version.sh ${{ github.event.inputs.increment || 'patch' }}
      working-directory: S3R_Production/build

    - name: Save version for next steps
      id: get_version
      run: |
        set -euo pipefail
        echo "version=$(cat S3R_Production/build/version.txt)" >> $GITHUB_OUTPUT

    - name: Commit version bump
      run: |
        set -euo pipefail
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add S3R_Production/build/version.txt S3R_Production/Shimmer_Driver/version.h
        git commit -m "chore: bump firmware version to v${{ steps.get_version.outputs.version }}" || echo "No changes to commit"
        git push

    - name: Check for clean working tree
      run: |
        set -euo pipefail
        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "Working tree is dirty. Please commit or stash changes before tagging."
          exit 1
        fi

    - name: Build firmware
      uses: xanderhendriks/action-build-stm32cubeide@v13.0
      with:
        project-path: 'S3R_Production'

    - name: Find and copy hex file
      run: |
        set -euo pipefail
        mkdir -p build
        HEX_PATH=""
        if [ -f S3R_Production/Release/S3R_Production.hex ]; then
          HEX_PATH=S3R_Production/Release/S3R_Production.hex
        elif [ -f S3R_Production/Debug/S3R_Production.hex ]; then
          HEX_PATH=S3R_Production/Debug/S3R_Production.hex
        else
          echo "No .hex file found in Release or Debug."
          exit 1
        fi
        cp "$HEX_PATH" build/LogAndStream_Shimmer3R_v${{ steps.get_version.outputs.version }}.hex

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-hex
        path: build/*.hex

    - name: Create Git tag
      run: |
        set -euo pipefail
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag "LogAndStream_Shimmer3R_v${{ steps.get_version.outputs.version }}"
        git push origin "LogAndStream_Shimmer3R_v${{ steps.get_version.outputs.version }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: LogAndStream_Shimmer3R_v${{ steps.get_version.outputs.version }}
        name: "Firmware LogAndStream_Shimmer3R_v${{ steps.get_version.outputs.version }}"
        generate_release_notes: true
        files: build/*.hex
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag submodule log-and-stream-common
      run: |
        set -euo pipefail
        cd S3R_Production/log-and-stream-common
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag "LogAndStream_Shimmer3R_v${{ steps.get_version.outputs.version }}"
        git push "https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/ShimmerResearch/log-and-stream-common.git" "LogAndStream_Shimmer3R_v${{ steps.get_version.outputs.version }}"
