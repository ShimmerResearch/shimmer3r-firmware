name: test-clang-format

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - uses: DoozyX/clang-format-lint-action@v0.17
      with:
        source: './S3R_Production/*'
        exclude: '*/Drivers */Middlewares'
        extensions: 'h,c'
        clangFormatVersion: 17
        style: file