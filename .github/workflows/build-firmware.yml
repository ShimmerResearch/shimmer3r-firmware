name: Build STM32 Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      increment:
        description: "Which version part to increment: major, minor, patch"
        default: "patch"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for tags

    - name: Set up ARM toolchain
      uses: carlosperate/arm-none-eabi-gcc-action@v1

    - name: Increment version
      run: |
        set -euo pipefail
        chmod +x FW_Shimmer3r/S3R_Production/build/scripts/increment_version.sh
        FW_Shimmer3r/S3R_Production/build/scripts/increment_version.sh ${{ github.event.inputs.increment || 'patch' }}
      working-directory: FW_Shimmer3r/S3R_Production/build

    - name: Save version for next steps
      id: get_version
      run: |
        set -euo pipefail
        echo "version=$(cat FW_Shimmer3r/S3R_Production/build/version.txt)" >> $GITHUB_OUTPUT

    - name: Commit version bump
      run: |
        set -euo pipefail
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add FW_Shimmer3r/S3R_Production/build/version.txt FW_Shimmer3r/S3R_Production/Shimmer_Driver/version.h
        git commit -m "chore: bump firmware version to v${{ steps.get_version.outputs.version }}" || echo "No changes to commit"
        git push

    - name: Check for clean working tree
      run: |
        set -euo pipefail
        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "Working tree is dirty. Please commit or stash changes before tagging."
          exit 1
        fi

    - name: Build firmware
      run: |
        set -euo pipefail
        mkdir -p build
        make -C FW_Shimmer3r/S3R_Production
        HEX_PATH=""
        if [ -f FW_Shimmer3r/S3R_Production/Release/S3R_Production.hex ]; then
          HEX_PATH=FW_Shimmer3r/S3R_Production/Release/S3R_Production.hex
        elif [ -f FW_Shimmer3r/S3R_Production/Debug/S3R_Production.hex ]; then
          HEX_PATH=FW_Shimmer3r/S3R_Production/Debug/S3R_Production.hex
        else
          echo "No .hex file found in Release or Debug."
          exit 1
        fi
        cp "$HEX_PATH" build/LogAndStream_Shimmer3R_v${{ steps.get_version.outputs.version }}.hex

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-hex
        path: build/*.hex

    - name: Create Git tag
      run: |
        set -euo pipefail
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag "v${{ steps.get_version.outputs.version }}"
        git push origin "v${{ steps.get_version.outputs.version }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: "Firmware v${{ steps.get_version.outputs.version }}"
        generate_release_notes: true
        files: build/*.hex
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
